server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API
    location /api/ {
        proxy_pass http://sret-backend-service:48642;
    }

    # Short URL
    location ~ ^/[A-Za-z0-9]+$ {
        rewrite ^/([A-Za-z0-9]+)$ /api/v1/link/$1 break;

        proxy_pass http://sret-backend-service:48642;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

}